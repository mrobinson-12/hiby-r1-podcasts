<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Podcast Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/podcast.js" defer></script>
</head>
<body>
    <div class="absolute top-3 right-3">
        <a href="/"><img src="/static/home.png" alt="Home" class="w-8 h-8"></a>
    </div>
    <div id="podcast-details" class="p-4 border rounded shadow-md space-y-3">
        <div class="flex space-x-3">
            <h2 id="podcast-title" class="text-2xl font-semibold mb-2"></h2>
        </div>
        <div id="podcast-description" class="mb-4"></div>
        <img id="podcast-image" class=" h-64 object-cover mb-4" src="" alt="Podcast Image">
      <h3>Recent Episodes:</h3>
      <ul id="episodes" class="list-disc list-inside">
    </ul>
      <button id="upload-button" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">Upload Recent Episodes</button>
        <button id="delete-button" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">Delete Podcast</button>
    </div>

</body>
</html>
